<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro Table Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/planck-js@0.3.31/dist/planck.min.js"></script>
</head>
<body>

    <!-- TOGGLE BUTTONS -->
    <button id="mobile-btn">📱 Fullscreen</button>
    <button id="options-btn">⚙️ Options</button>

    <!-- SENSOR STATS HUD (Top Right) -->
    <div id="stats-panel">
        <div><strong>Tilt (°):</strong> β:<span id="tilt-x">0.0</span> γ:<span id="tilt-y">0.0</span></div>
        <div><strong>Acc (m/s²):</strong> X:<span id="acc-x">0.0</span> Y:<span id="acc-y">0.0</span> Z:<span id="acc-z">0.0</span></div>
        <div><strong>Gyro (°/s):</strong> X:<span id="gyr-x">0.0</span> Y:<span id="gyr-y">0.0</span> Z:<span id="gyr-z">0.0</span></div>
    </div>

    <!-- UI Overlay for Calibration -->
    <div id="ui-layer">
        <div id="menu">
            <h1>Tilt Board</h1>
            <p><strong>Mobile:</strong> Place phone flat on the table.</p>
            <p><strong>Desktop:</strong> Use your mouse cursor to tilt.</p>
            <button id="start-btn">Start Calibration</button>
        </div>
        
        <div id="calibration-screen" class="hidden">
            <h2>Calibrating...</h2>
            <p>Do not move your device.</p>
            <div id="countdown">4</div>
        </div>
    </div>

    <!-- Options Menu Overlay -->
    <div id="options-screen" class="hidden">
        <div id="options-menu">
            <h2>Settings</h2>
            <br>
            
            <label for="tilt-style"><strong>Tilt Responsiveness:</strong></label><br>
            <select id="tilt-style">
                <option value="LOGARITHMIC">New Style (Aggressive / Logarithmic)</option>
                <option value="LINEAR">Old Style (Linear / Smooth)</option>
            </select>
            
            <br><br>
            
            <label for="board-size"><strong>Board Size:</strong> <span id="board-size-val">90%</span></label><br>
            <input type="range" id="board-size" min="0.4" max="1.5" step="0.05" value="0.9">
            
            <br><br>
            <button id="close-options-btn">Close</button>
        </div>
    </div>

    <!-- GAME CONTAINER -->
    <div id="game-container">
        <!-- THE SCREEN: Fixed resolution internal logic -->
        <div id="screen">
            <div id="table">
                <canvas id="gameCanvas" width="600" height="600"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
